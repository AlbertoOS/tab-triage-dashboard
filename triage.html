<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tab Triage</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧐</text></svg>">
  <link rel="stylesheet" href="triage.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>🧐 Tab Triage</h1>
      <div id="stats"></div>
    </header>

    <div id="controls">
      <div class="control-row">
        <input type="text" id="search" placeholder="Search tabs (title, URL, domain)..." autofocus>
        <button id="refresh" title="Refresh tab data"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg> Refresh</button>
        <label>Favicon:
          <input type="range" id="faviconSize" min="16" max="48" step="4" value="16">
          <span id="faviconSizeLabel">16px</span>
        </label>
      </div>

      <div class="control-row">
        <label>Group by:
          <select id="groupBy">
            <option value="none">None</option>
            <option value="domain">Domain</option>
            <option value="window">Window</option>
            <option value="age">Age bucket</option>
            <option value="status">Status</option>
            <option value="duplicate">Duplicates</option>
          </select>
        </label>
        <div class="domain-filter">
          <button id="domainDropdownBtn" class="dropdown-btn">All domains</button>
          <div id="domainDropdown" class="dropdown-panel">
            <input type="text" id="domainSearch" placeholder="Search domains..." class="dropdown-search">
            <div class="dropdown-actions">
              <button id="domainSelectAll" class="dropdown-action-btn">All</button>
              <button id="domainSelectNone" class="dropdown-action-btn">None</button>
            </div>
            <div id="domainList" class="dropdown-list"></div>
          </div>
        </div>
      </div>

      <div class="control-row filter-checkboxes">
        <fieldset class="filter-group">
          <legend>Age</legend>
          <label><input type="checkbox" name="filterAge" value="1h"> &lt; 1h</label>
          <label><input type="checkbox" name="filterAge" value="24h"> &lt; 24h</label>
          <label><input type="checkbox" name="filterAge" value="7d"> &lt; 7d</label>
          <label><input type="checkbox" name="filterAge" value="30d"> &lt; 30d</label>
          <label><input type="checkbox" name="filterAge" value="30d+"> 30d+</label>
          <label><input type="checkbox" name="filterAge" value="90d+"> 90d+</label>
          <label><input type="checkbox" name="filterAge" value="180d+"> 180d+</label>
          <label><input type="checkbox" name="filterAge" value="365d+"> 365d+</label>
        </fieldset>

        <fieldset class="filter-group filter-group-status">
          <legend>Status</legend>
          <button class="status-toggle" data-status="pinned" data-state="off">Pinned</button>
          <button class="status-toggle" data-status="audible" data-state="off">Audible</button>
          <button class="status-toggle" data-status="muted" data-state="off">Muted</button>
          <button class="status-toggle" data-status="discarded" data-state="off">Discarded</button>
          <button class="status-toggle" data-status="active" data-state="off">Active</button>
          <button class="status-toggle" data-status="duplicate" data-state="off">Duplicate</button>
        </fieldset>
      </div>

      <div class="control-row">
        <label class="toggle-label">
          <input type="checkbox" id="showIgnored"> Show ignored only
        </label>
        <button id="toggleIgnoredPanel" class="btn-manage-ignored">Manage ignored (<span id="ignoredCount">0 URLs, 0 domains</span>)</button>
      </div>

      <div id="ignoredPanel" class="ignored-panel">
        <div class="ignored-section">
          <h3>Ignored domains</h3>
          <ul id="ignoredDomainList" class="ignored-list"></ul>
        </div>
        <div class="ignored-section">
          <h3>Ignored URLs</h3>
          <ul id="ignoredUrlList" class="ignored-list"></ul>
        </div>
        <button id="resetIgnored" class="btn-reset-ignored">Reset all ignored</button>
      </div>
    </div>

    <div id="table-container">
      <table id="tab-table">
        <thead>
          <tr>
            <th data-sort="index" class="sortable col-index">#</th>
            <th data-sort="title" class="sortable col-title">Title</th>
            <th data-sort="domain" class="sortable col-domain">Domain</th>
            <th data-sort="domainCount" class="sortable col-count">Domain Tabs</th>
            <th data-sort="lastAccessed" class="sortable col-accessed">Last Accessed</th>
            <th data-sort="age" class="sortable col-age">Age</th>
            <th data-sort="windowId" class="sortable col-window">Window</th>
            <th data-sort="status" class="sortable col-status">Status</th>
            <th class="col-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="tab-body"></tbody>
      </table>
    </div>
  </div>

  <script src="triage.js"></script>
</body>
</html>
